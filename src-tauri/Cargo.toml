[package]
name = "voltenv"
version = "0.1.0"
description = "Lightweight local development environment manager"
authors = ["VoltEnv Team"]
edition = "2021"

[build-dependencies]
tauri-build = "2.0"

[dependencies]
tauri = { version = "2.0", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "2.0"
directories = "6.0"
dirs = "6.0"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
