[package]
name = "voltenv"
version = "0.0.1"
description = "Lightweight local development environment manager"
authors = ["VoltEnv Team"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
directories = "6.0"
dirs = "6.0"
reqwest = "0.12"
zip = "2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
